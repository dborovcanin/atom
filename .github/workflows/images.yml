name: Publish container images

on:
  push:
    branches: [main]

concurrency:
  group: publish-container-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ATOM_IMAGE: ${{ github.repository_owner }}/atom
  ATOM_UI_IMAGE: ${{ github.repository_owner }}/atom-ui

jobs:
  publish:
    name: Build and push latest images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Atom
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: release
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ATOM_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=atom
          cache-to: type=gha,mode=max,scope=atom

      - name: Build and push Atom UI
        uses: docker/build-push-action@v7
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ATOM_UI_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=atom-ui
          cache-to: type=gha,mode=max,scope=atom-ui
